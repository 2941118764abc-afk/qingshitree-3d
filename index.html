<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三星堆青铜神树 - 3D交互展示</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  font-family: 'Microsoft YaHei', Arial, sans-serif;
  overflow: hidden;
  color: #e0e0e0;
}

#loading-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  z-index: 9999; transition: opacity 0.6s ease;
}
#loading-overlay.fade-out { opacity: 0; pointer-events: none; }
.loader { width: 60px; height: 60px; border: 4px solid rgba(218,165,32,0.2); border-top: 4px solid #daa520; border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#loading-overlay p { margin-top: 20px; color: #daa520; font-size: 16px; letter-spacing: 2px; }

#container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

.title-overlay {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  text-align: center; z-index: 100; pointer-events: none;
}
.title-overlay h1 {
  font-size: 28px; font-weight: 300; letter-spacing: 6px;
  color: #daa520; text-shadow: 0 0 20px rgba(218,165,32,0.5);
  margin-bottom: 5px;
}
.title-overlay p { font-size: 13px; color: rgba(255,255,255,0.5); letter-spacing: 2px; }

.info-panel {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
  padding: 12px 24px; z-index: 100; pointer-events: none;
}
.info-panel p { font-size: 12px; color: rgba(255,255,255,0.6); letter-spacing: 1px; }

.hotspot-marker {
  position: absolute; width: 24px; height: 24px; margin-left: -12px; margin-top: -12px;
  cursor: pointer; z-index: 10; pointer-events: all;
  transition: transform 0.2s ease;
}
.hotspot-marker:hover { transform: scale(1.3); z-index: 20; }
.hotspot-ring {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  border: 2px solid #daa520; border-radius: 50%;
  animation: hotspotPulse 2s ease-in-out infinite;
  box-shadow: 0 0 10px rgba(218,165,32,0.6);
}
@keyframes hotspotPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.5); opacity: 0; }
}
.hotspot-dot {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 8px; height: 8px; background: #daa520; border-radius: 50%;
  box-shadow: 0 0 8px rgba(218,165,32,0.8);
}
.hotspot-label {
  position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
  border: 1px solid rgba(218,165,32,0.5); border-radius: 6px;
  padding: 4px 10px; white-space: nowrap;
  font-size: 12px; color: #daa520; letter-spacing: 1px;
  opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
}
.hotspot-marker:hover .hotspot-label { opacity: 1; }

.detail-panel {
  position: fixed; top: 50%; right: -450px; transform: translateY(-50%);
  width: 400px; max-height: 80vh; overflow-y: auto;
  background: rgba(10,10,30,0.95); backdrop-filter: blur(20px);
  border-left: 1px solid rgba(218,165,32,0.3);
  padding: 30px; z-index: 200;
  transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.detail-panel.visible { right: 0; }
.detail-panel h2 {
  font-size: 22px; font-weight: 300; color: #daa520;
  letter-spacing: 3px; margin-bottom: 15px;
  padding-bottom: 10px; border-bottom: 1px solid rgba(218,165,32,0.3);
}
.detail-panel .close-btn {
  position: absolute; top: 15px; right: 15px;
  width: 30px; height: 30px; border: none; background: none;
  color: rgba(255,255,255,0.5); font-size: 20px; cursor: pointer;
  transition: color 0.3s;
}
.detail-panel .close-btn:hover { color: #daa520; }
.detail-panel p { font-size: 14px; line-height: 1.8; color: rgba(255,255,255,0.8); text-indent: 2em; }
.detail-panel .meta { margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
.detail-panel .meta-item { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
.detail-panel .meta-item span { color: #daa520; }

@media (max-width: 768px) {
  .title-overlay h1 { font-size: 20px; letter-spacing: 3px; }
  .detail-panel { width: 100%; max-height: 60vh; padding: 20px; }
  .info-panel { bottom: 15px; padding: 8px 16px; }
}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="loader"></div>
  <p>加载中...</p>
</div>

<div class="title-overlay">
  <h1>三星堆青铜神树</h1>
  <p>BRONZE TREE OF SANXINGDUI</p>
</div>

<div id="container"></div>

<div class="info-panel">
  <p>🖱 Drag to rotate · Scroll to zoom · Click marker for details</p>
</div>

<div id="hotspots-container" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;"></div>

<div id="detail-panel" class="detail-panel">
  <button class="close-btn" onclick="closeDetail()">×</button>
  <h2 id="detail-title"></h2>
  <p id="detail-desc"></p>
  <div class="meta" id="detail-meta"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

let scene, camera, renderer, controls, model;
let hotspots = [];

// 标注点数据 - 已校准到正确位置
const hotspotData = [
  {
    id: 'trunk',
    position: { x: -0.0523, y: 0.0663, z: 0.0043 },
    title: '树干',
    desc: '青铜神树的主干，高约3.95米，由多节套接而成，表面饰有精美的夔龙纹和云雷纹。树干笔直挺拔，象征着通往天界的通道，体现了古蜀人"通天神树"的宇宙观。',
    meta: { '高度': '约3.95米', '直径': '约30厘米', '重量': '约1000公斤', '年代': '商代晚期（约3000年前）' }
  },
  {
    id: 'branch',
    position: { x: 0.1683, y: 0.3338, z: 0.1243 },
    title: '九枝',
    desc: '神树主干上的九根枝条，分层向外伸展，每层三根，呈对称分布。枝条末端悬挂着花朵和果实，寓意"九天"之数，反映了古蜀人独特的天文认知体系。',
    meta: { '层数': '3层', '枝条数': '9根', '分布': '每层3根对称分布', '象征': '九天、九野' }
  },
  {
    id: 'dragon',
    position: { x: -0.1815, y: -0.4147, z: 0.0302 },
    title: '神龙',
    desc: '沿着树干蜿蜒下降的青铜神龙，造型生动，鳞片细致。龙身呈S形曲线，龙头朝下，似乎在守护着神树。这一形象与《山海经》中"烛龙"的记载相呼应，是古蜀人龙崇拜的重要证据。',
    meta: { '长度': '约1.2米', '姿态': '蜿蜒下降', '纹饰': '鳞片纹、云雷纹', '文化意义': '通天神兽、守护者' }
  },
  {
    id: 'bird',
    position: { x: 0.1043, y: 0.1547, z: 0.1111 },
    title: '神鸟',
    desc: '栖息在枝头的青铜神鸟，共九只，对应"九日居日"的神话传说。鸟形酷似太阳神鸟，与四川金沙遗址出土的金箔图案有着惊人的相似性，揭示了古蜀文明中太阳崇拜的核心地位。',
    meta: { '数量': '9只（复原推测）', '姿态': '昂首站立', '象征': '太阳、重生', '关联': '金沙遗址太阳神鸟' }
  }
];

// 模型URL - 请替换为你的实际模型链接
const MODEL_URL = 'https://your-cdn.com/qingshitree.glb';  // ← 修改这里！

init();

function init() {
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0a0a1a, 0.015);

  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0.5, 0.3, 0.8);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  renderer.shadowMap.enabled = true;
  document.getElementById('container').appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.minDistance = 0.3;
  controls.maxDistance = 2;
  controls.target.set(0, 0, 0);

  const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(ambientLight);

  const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.5);
  mainLight.position.set(5, 8, 5);
  mainLight.castShadow = true;
  scene.add(mainLight);

  const fillLight = new THREE.DirectionalLight(0x88aaff, 0.4);
  fillLight.position.set(-5, 3, -5);
  scene.add(fillLight);

  const rimLight = new THREE.DirectionalLight(0xffcc66, 0.8);
  rimLight.position.set(0, 2, -5);
  scene.add(rimLight);

  const groundGeo = new THREE.CircleGeometry(3, 64);
  const groundMat = new THREE.MeshStandardMaterial({
    color: 0x1a1a2e, metalness: 0.8, roughness: 0.3,
  });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.6;
  ground.receiveShadow = true;
  scene.add(ground);

  // 加载模型
  const loader = new GLTFLoader();
  loader.load(
    MODEL_URL,
    (gltf) => {
      model = gltf.scene;
      model.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
      scene.add(model);
      createHotspots();
      setTimeout(() => {
        document.getElementById('loading-overlay').classList.add('fade-out');
        setTimeout(() => { document.getElementById('loading-overlay').style.display = 'none'; }, 600);
      }, 500);
    },
    (xhr) => {
      const percent = Math.floor((xhr.loaded / xhr.total) * 100);
      document.querySelector('#loading-overlay p').textContent = `加载中 ${percent}%`;
    },
    (error) => {
      console.error('模型加载失败:', error);
      document.querySelector('#loading-overlay p').textContent = '模型加载失败，请检查网络连接';
    }
  );

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
  
  animate();
}

function createHotspots() {
  if (!model) return;
  hotspotData.forEach(data => {
    const anchor = new THREE.Object3D();
    anchor.position.set(data.position.x, data.position.y, data.position.z);
    model.add(anchor);
    
    const marker = document.createElement('div');
    marker.className = 'hotspot-marker';
    marker.dataset.id = data.id;
    marker.innerHTML = `
      <div class="hotspot-ring"></div>
      <div class="hotspot-dot"></div>
      <div class="hotspot-label">${data.title}</div>
    `;
    marker.addEventListener('click', (e) => {
      e.stopPropagation();
      showDetail(data);
    });
    document.getElementById('hotspots-container').appendChild(marker);
    
    hotspots.push({ anchor, marker, data });
  });
}

function updateHotspots() {
  if (!camera || !renderer) return;
  hotspots.forEach(({ anchor, marker }) => {
    const worldPos = new THREE.Vector3();
    anchor.getWorldPosition(worldPos);
    
    const vector = worldPos.clone().project(camera);
    const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-vector.y * 0.5 + 0.5) * window.innerHeight;
    
    marker.style.left = x + 'px';
    marker.style.top = y + 'px';
    
    const visible = vector.z < 1;
    marker.style.display = visible ? 'block' : 'none';
  });
}

function showDetail(data) {
  document.getElementById('detail-title').textContent = data.title;
  document.getElementById('detail-desc').textContent = data.desc;
  
  let metaHTML = '';
  for (const [key, value] of Object.entries(data.meta)) {
    metaHTML += `<div class="meta-item"><strong>${key}：</strong><span>${value}</span></div>`;
  }
  document.getElementById('detail-meta').innerHTML = metaHTML;
  
  document.getElementById('detail-panel').classList.add('visible');
}

window.closeDetail = function() {
  document.getElementById('detail-panel').classList.remove('visible');
};

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  updateHotspots();
  renderer.render(scene, camera);
}
</script>
</body>
</html>
